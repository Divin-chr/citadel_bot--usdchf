mode: paper

# ── MetaApi (paper config; production uses env vars) ─────────────────
mt5_login: 0
mt5_password: ''
mt5_path: C:\Program Files\MetaTrader 5\terminal64.exe
mt5_server: ''

# ── Instruments ──────────────────────────────────────────────────────
instruments:
- US30
- US500
- NDAQ
- USOUSD
- BTCUSD
- ETHUSD
instrument_currency: {}
instrument_exchange: {}
instrument_multiplier: {}
instrument_session: {}
per_instrument: {}

# ── Data ─────────────────────────────────────────────────────────────
bar_size: 1 min
history_bars: 400
data_dir: data
log_dir: logs
log_level: INFO
loop_interval_sec: 30.0

# ── Grid strategy (Teeple 2025) ──────────────────────────────────────
grid_candidates_indices:
- 2.0
- 5.0
- 10.0
- 25.0
- 50.0
- 100.0
- 250.0
grid_candidates_forex:
- 0.0010
- 0.0025
- 0.0050
- 0.0100
- 0.0250
grid_candidates_crypto:
- 10.0
- 50.0
- 100.0
- 500.0
- 1000.0
- 5000.0
grid_candidates_commodities:
- 0.10
- 0.25
- 0.50
- 1.00
- 5.00
grid_dead_zone: 0.10
grid_edge_dead_zone: 0.05
grid_recalibration_days: 30
grid_min_significance: 0.05
range_break_lookback: 5
atr_period_for_stops: 14
atr_sl_buffer: 0.25
signal_cooldown_bars: 30
disable_signal_filters: false

# ── Signal acceptance ────────────────────────────────────────────────
min_rr_ratio: 1.0
tp1_size_pct: 0.5

# ── Risk ─────────────────────────────────────────────────────────────
max_risk_per_trade_pct: 0.015
max_daily_drawdown_pct: 0.04
max_concurrent_positions: 2
max_correlation: 0.7
max_correlated_positions: 1
disable_risk_filters: false

# ── Sessions / macro ─────────────────────────────────────────────────
trade_session_start: 09:30
trade_session_end: '16:00'
avoid_first_minutes: 5
macro_halt_minutes_before: 30
macro_halt_minutes_after: 60

# ── Kelly sizing ─────────────────────────────────────────────────────
use_kelly_sizing: true
kelly_fraction: 0.5
kelly_cap_pct: 0.02
kelly_lookback_trades: 50
portfolio_heat_cap_pct: 0.06

# ── Trailing stop ────────────────────────────────────────────────────
trailing_stop_after_tp1: true

# ── Signal logging ───────────────────────────────────────────────────
signal_logging: true

# ── Backtest cost model ──────────────────────────────────────────────
backtest_commission_per_lot: 0.0
backtest_slippage_pts: 1.0
backtest_spread_pts: 0.0
